server:
  port: ${FANFLOW_SERVER_PORT:8096}

spring:
  datasource:
    url: ${FANFLOW_DB_URL}
    username: ${FANFLOW_DB_USERNAME}
    password: ${FANFLOW_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${FANFLOW_JWT_SECRET}
  expiration: ${FANFLOW_JWT_EXPIRATION:1800000}

file:
  upload-dir: ${FANFLOW_FILE_UPLOAD_DIR}

app:
  cors:
    allowed-origins: ${FANFLOW_CORS_ALLOWED_ORIGINS}